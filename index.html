<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
    <title>Keep Notes</title>
</head>
<body>

    <!-- Small secret status indicator -->
    <div id="status-dot"></div>

    <div id="header">
        <span id="back-icon">←</span>
        <input type="text" id="title-input" placeholder="Title">
    </div>

    <textarea id="note-body" placeholder="Note" spellcheck="false"></textarea>

    <!-- Invisible Tap Zones -->
    <div id="tap-overlay">
        <div class="zone" id="zone-0"></div> <!-- Straight -->
        <div class="zone" id="zone-1"></div> <!-- Curved -->
        <div class="zone" id="zone-2"></div> <!-- Mixed -->
    </div>

    <script src="app.js"></script>
</body>
</html>
